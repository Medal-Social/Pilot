name: Promote dev to prod

on:
  schedule:
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Open a promotion PR even if no pending changesets'
        required: false
        default: 'false'
        type: boolean

permissions: {}

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Check for pending changesets on dev
        id: check
        run: |
          set -euo pipefail
          git fetch origin dev prod --quiet

          # Pathspec must use :(glob) — git's default pathspec matching is
          # literal, so '.changeset/*.md' would match a file LITERALLY named
          # '*.md' and return empty (the bug that forced force=true on every
          # manual promote prior to this fix).
          pending="$(comm -23 \
            <(git ls-tree -r origin/dev --name-only -- ':(glob).changeset/*.md' | grep -v 'README.md' | sort) \
            <(git ls-tree -r origin/prod --name-only -- ':(glob).changeset/*.md' | grep -v 'README.md' | sort) \
            | wc -l | tr -d ' ')"

          commits="$(git rev-list origin/prod..origin/dev --count)"

          echo "pending=$pending" >> "$GITHUB_OUTPUT"
          echo "commits=$commits" >> "$GITHUB_OUTPUT"
          echo "Pending changesets: $pending"
          echo "Dev ahead of prod by: $commits commits"

      - name: Check for existing promotion PR
        id: existing
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Match any open PR targeting prod whose head branch is `dev` or
          # any auto-generated `chore/promote-*` branch from a prior run.
          dev_pr="$(gh pr list --repo ${{ github.repository }} --base prod --head dev --state open --json number --jq '.[0].number // empty')"
          ancestry_pr="$(gh pr list --repo ${{ github.repository }} --base prod --state open --search 'head:chore/promote-with-ancestry-' --json number --jq '.[0].number // empty')"
          existing="${dev_pr:-$ancestry_pr}"
          echo "existing=$existing" >> "$GITHUB_OUTPUT"

      - name: Build promote-with-ancestry branch
        id: branch
        if: |
          steps.existing.outputs.existing == '' &&
          (steps.check.outputs.pending != '0' || (github.event_name == 'workflow_dispatch' && inputs.force)) &&
          steps.check.outputs.commits != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Required by `required_linear_history: true` on dev: every back-merge
          # of prod into dev gets squashed, which loses prod's commits as
          # ancestors of dev. Each subsequent dev→prod promote then re-discovers
          # the same conflicts (exactly what the manual #86 / #91 dance fixed).
          #
          # Workaround: build a sibling branch off dev with prod merged in via
          # `--no-ff -X ours`. dev's content is authoritative (prod's content is
          # already on dev via the prior squash back-merge), so `-X ours`
          # auto-resolves any text conflicts to dev's version. The promote PR
          # uses this branch as head, so the diff vs prod is clean.
          branch="chore/promote-with-ancestry-$(date -u +%Y%m%d-%H%M%S)"

          git config user.name "medal-social-release-bot[bot]"
          git config user.email "277925859+medal-social-release-bot[bot]@users.noreply.github.com"

          git checkout -B "$branch" origin/dev
          if ! git merge origin/prod --no-ff -X ours -m "chore: merge prod into promote branch (re-add prod ancestry)"; then
            echo "::error::Auto-merge failed even with -X ours — there are unmergeable changes (likely both sides modified the same lines incompatibly). Resolve manually and re-run."
            git merge --abort || true
            exit 1
          fi

          git push origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open promotion PR
        if: steps.branch.outputs.branch != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          PENDING: ${{ steps.check.outputs.pending }}
          COMMITS: ${{ steps.check.outputs.commits }}
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          ## Summary

          Automated promotion of \`dev\` to \`prod\`.

          - Pending changesets: ${PENDING}
          - Commits ahead of prod: ${COMMITS}
          - Head branch: \`${BRANCH}\` (dev with prod merged in via \`--no-ff -X ours\` to preserve ancestry)

          ## What happens after merge

          1. Merging this to \`prod\` triggers the Release workflow.
          2. Release workflow opens a \`chore: release packages\` PR that bumps versions and regenerates the changelog.
          3. Merging that PR publishes to npm and creates the GitHub release tag.
          4. Tag publish triggers \`build-binaries.yml\` which uploads binaries + opens a Homebrew formula PR.
          5. \`release.yml\` opens a \`chore: back-merge prod into dev\` PR so the version bumps and consumed changesets land back on \`dev\`.

          ---

          _Opened automatically by [\`promote.yml\`](.github/workflows/promote.yml)._
          EOF
          )

          gh pr create \
            --repo ${{ github.repository }} \
            --base prod \
            --head "$BRANCH" \
            --title "chore: promote dev to prod" \
            --body "$body"

      - name: No-op summary
        if: |
          steps.existing.outputs.existing != '' ||
          (steps.check.outputs.pending == '0' && !(github.event_name == 'workflow_dispatch' && inputs.force)) ||
          steps.check.outputs.commits == '0'
        run: |
          if [ -n "${{ steps.existing.outputs.existing }}" ]; then
            echo "Skip: existing open promotion PR #${{ steps.existing.outputs.existing }}"
          elif [ "${{ steps.check.outputs.commits }}" = '0' ]; then
            echo "Skip: dev and prod are in sync"
          else
            echo "Skip: no pending changesets (use workflow_dispatch with force=true to override)"
          fi
