name: Build Binaries

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: pilot-darwin-arm64
          - os: macos-15-intel
            target: pilot-darwin-x64
          - os: ubuntu-latest
            target: pilot-linux-x64
          - os: ubuntu-24.04-arm
            target: pilot-linux-arm64
          - os: windows-latest
            target: pilot-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @medalsocial/pilot build

      - name: Install optional deps for bundling
        run: pnpm add -D react-devtools-core --filter @medalsocial/pilot

      - name: Compile binary (Unix)
        if: "!contains(matrix.target, 'win')"
        run: bun build packages/cli/dist/bin/pilot.js --compile --outfile ${{ matrix.target }}

      - name: Compile binary (Windows)
        if: contains(matrix.target, 'win')
        run: bun build packages/cli/dist/bin/pilot.js --compile --outfile ${{ matrix.target }}

      - name: Smoke test binary (Unix)
        if: "!contains(matrix.target, 'win')"
        run: |
          chmod +x ${{ matrix.target }}
          ./${{ matrix.target }} --version
          ./${{ matrix.target }} --help

      - name: Smoke test binary (Windows)
        if: contains(matrix.target, 'win')
        shell: pwsh
        run: |
          & ".\${{ matrix.target }}" --version
          & ".\${{ matrix.target }}" --help

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign binary (Unix)
        if: "!contains(matrix.target, 'win')"
        run: cosign sign-blob --yes --bundle ${{ matrix.target }}.bundle ${{ matrix.target }}

      - name: Sign binary (Windows)
        if: contains(matrix.target, 'win')
        run: cosign sign-blob --yes --bundle ${{ matrix.target }}.bundle ${{ matrix.target }}

      - name: Upload binary and signatures to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            ${{ matrix.target }}
            ${{ matrix.target }}.bundle

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ matrix.target }}

  sync-homebrew:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binaries and compute SHA256s
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/Medal-Social/pilot/releases/download/${TAG}"

          for bin in pilot-darwin-arm64 pilot-darwin-x64 pilot-linux-x64 pilot-linux-arm64; do
            curl -fsSL "${BASE}/${bin}" -o "/tmp/${bin}"
            sha=$(sha256sum "/tmp/${bin}" | cut -d' ' -f1)
            key=$(echo "${bin}" | tr '-' '_')
            echo "SHA_${key}=${sha}" >> "$GITHUB_ENV"
          done

      - name: Update formula with real SHA256s
        run: |
          sed -i "s|sha256 \".*\" # darwin-arm64|sha256 \"${SHA_pilot_darwin_arm64}\" # darwin-arm64|" homebrew-pilot/pilot.rb
          sed -i "s|sha256 \".*\" # darwin-x64|sha256 \"${SHA_pilot_darwin_x64}\" # darwin-x64|" homebrew-pilot/pilot.rb
          sed -i "s|sha256 \".*\" # linux-arm64|sha256 \"${SHA_pilot_linux_arm64}\" # linux-arm64|" homebrew-pilot/pilot.rb
          sed -i "s|sha256 \".*\" # linux-x64|sha256 \"${SHA_pilot_linux_x64}\" # linux-x64|" homebrew-pilot/pilot.rb

      - name: Sync to homebrew-pilot repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_SYNC_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Medal-Social/homebrew-pilot.git" /tmp/homebrew-pilot
          cp homebrew-pilot/pilot.rb /tmp/homebrew-pilot/pilot.rb
          cp homebrew-pilot/README.md /tmp/homebrew-pilot/README.md
          cd /tmp/homebrew-pilot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update formula for ${GITHUB_REF_NAME}"
          git push
