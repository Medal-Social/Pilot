name: Build Binaries

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    if: startsWith(github.event.release.tag_name, '@medalsocial/pilot@')
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: pilot-darwin-arm64
          - os: macos-15-intel
            target: pilot-darwin-x64
          - os: ubuntu-latest
            target: pilot-linux-x64
          - os: ubuntu-24.04-arm
            target: pilot-linux-arm64
          - os: windows-latest
            target: pilot-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - run: pnpm install --frozen-lockfile

      - name: Build workspace (kit first, then CLI via turbo)
        run: pnpm build

      - name: Compile binary (Unix)
        if: "!contains(matrix.target, 'win')"
        run: bun build packages/cli/dist/bin/pilot.js --compile --outfile ${{ matrix.target }}

      - name: Compile binary (Windows)
        if: contains(matrix.target, 'win')
        run: bun build packages/cli/dist/bin/pilot.js --compile --outfile ${{ matrix.target }}

      - name: Smoke test binary (Unix)
        if: "!contains(matrix.target, 'win')"
        run: |
          chmod +x ${{ matrix.target }}
          ./${{ matrix.target }} --version
          ./${{ matrix.target }} --help

      - name: Smoke test binary (Windows)
        if: contains(matrix.target, 'win')
        shell: pwsh
        run: |
          & ".\${{ matrix.target }}" --version
          & ".\${{ matrix.target }}" --help

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign binary (Unix)
        if: "!contains(matrix.target, 'win')"
        run: cosign sign-blob --yes --bundle ${{ matrix.target }}.bundle ${{ matrix.target }}

      - name: Sign binary (Windows)
        if: contains(matrix.target, 'win')
        run: cosign sign-blob --yes --bundle ${{ matrix.target }}.bundle ${{ matrix.target }}

      - name: Upload binary and bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.target }}
            ${{ matrix.target }}.bundle

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.target }}

  upload-release:
    needs: build
    # Run even if some matrix targets failed, so partial artifacts still publish.
    # Skips only if the workflow itself was cancelled or the tag is not a pilot release.
    if: ${{ !cancelled() && startsWith(github.event.release.tag_name, '@medalsocial/pilot@') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Report which targets produced artifacts
        run: |
          set -euo pipefail
          echo "Artifacts present:"
          ls -1 artifacts/ || echo "(none)"
          if [ -z "$(ls -A artifacts/ 2>/dev/null)" ]; then
            echo "::error::No matrix target produced artifacts — nothing to upload."
            exit 1
          fi

      - name: Upload binaries and bundles to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/*/*

  sync-homebrew:
    needs: upload-release
    if: startsWith(github.event.release.tag_name, '@medalsocial/pilot@')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binaries and compute SHA256s
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_SYNC_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release download "${TAG_NAME}" \
            --repo Medal-Social/Pilot \
            --pattern 'pilot-darwin-arm64' \
            --pattern 'pilot-darwin-x64' \
            --pattern 'pilot-linux-x64' \
            --pattern 'pilot-linux-arm64' \
            --dir /tmp/binaries

          for bin in pilot-darwin-arm64 pilot-darwin-x64 pilot-linux-x64 pilot-linux-arm64; do
            sha=$(sha256sum "/tmp/binaries/${bin}" | cut -d' ' -f1)
            key=$(echo "${bin}" | tr '-' '_')
            echo "SHA_${key}=${sha}" >> "$GITHUB_ENV"
          done

      - name: Update formula with real SHA256s
        run: |
          sed -i "s|sha256 \".*\" # darwin-arm64|sha256 \"${SHA_pilot_darwin_arm64}\" # darwin-arm64|" homebrew-pilot/pilot.rb
          sed -i "s|sha256 \".*\" # darwin-x64|sha256 \"${SHA_pilot_darwin_x64}\" # darwin-x64|" homebrew-pilot/pilot.rb
          sed -i "s|sha256 \".*\" # linux-arm64|sha256 \"${SHA_pilot_linux_arm64}\" # linux-arm64|" homebrew-pilot/pilot.rb
          sed -i "s|sha256 \".*\" # linux-x64|sha256 \"${SHA_pilot_linux_x64}\" # linux-x64|" homebrew-pilot/pilot.rb

      - name: Sync to homebrew-pilot repo via PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_SYNC_TOKEN }}
          RELEASE_LABEL: ${{ github.event.release.name || github.event.release.tag_name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          REMOTE_REPO: Medal-Social/homebrew-pilot
        run: |
          set -euo pipefail

          # Sanitize the tag for use in a branch name: '@medalsocial/pilot@0.2.3'
          # → 'medalsocial-pilot-0.2.3'.
          slug="$(printf '%s' "$TAG_NAME" | sed -e 's|^@||' -e 's|@|-|g' -e 's|/|-|g')"
          branch="chore/update-formula-${slug}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REMOTE_REPO}.git" /tmp/homebrew-pilot
          cp homebrew-pilot/pilot.rb /tmp/homebrew-pilot/pilot.rb
          cp homebrew-pilot/README.md /tmp/homebrew-pilot/README.md
          cd /tmp/homebrew-pilot

          # No formula changes (e.g. re-run for an unchanged release) → nothing
          # to do. This must run before any branch / commit / push work so a
          # successful re-run on identical artifacts is a clean no-op.
          if git diff --quiet; then
            echo "No formula changes — nothing to sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Idempotent branch handling: a re-run for the same tag must not
          # explode on non-fast-forward push. Fetch the remote branch first if
          # it exists so `--force-with-lease` has a baseline to compare against;
          # this is bot-owned and single-producer, so force-with-lease is safe.
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Remote branch $branch already exists — will overwrite with this run's formula."
            git fetch origin "$branch":"refs/remotes/origin/${branch}"
          fi

          git checkout -B "$branch"
          git add -A
          git commit -m "chore: update formula for ${RELEASE_LABEL}"
          git push --force-with-lease origin "$branch"

          # Idempotent PR creation: only call `gh pr create` if no open PR
          # already targets prod from this branch. Otherwise the second run
          # would fail with "a pull request for branch ... already exists".
          existing_pr="$(gh pr list \
            --repo "${REMOTE_REPO}" \
            --head "$branch" \
            --base prod \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "$existing_pr" ]; then
            gh pr create \
              --repo "${REMOTE_REPO}" \
              --base prod \
              --head "$branch" \
              --title "chore: update formula for ${RELEASE_LABEL}" \
              --body "Automated formula update from \`Medal-Social/Pilot\` release \`${RELEASE_LABEL}\`.

          Updated SHA256s for darwin-arm64, darwin-x64, linux-arm64, linux-x64 from the binaries attached to the GitHub release.

          _Auto-generated by [\`build-binaries.yml\`](https://github.com/Medal-Social/Pilot/blob/prod/.github/workflows/build-binaries.yml)._"
          else
            echo "PR #${existing_pr} already exists for ${branch} — re-using."
          fi

          # Best-effort enable squash auto-merge on the (new or existing) PR.
          # If the bot can't (e.g. required reviews on prod block self-approve),
          # the PR waits for a maintainer. Either way the formula update lands
          # as a reviewable PR instead of a forbidden direct push.
          gh pr merge \
            --repo "${REMOTE_REPO}" \
            --auto \
            --squash \
            "$branch" || echo "Auto-merge not enabled — formula PR awaits manual merge."
