name: Build Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: pilot-darwin-arm64
          - os: macos-13
            target: pilot-darwin-x64
          - os: ubuntu-latest
            target: pilot-linux-x64
          - os: ubuntu-24.04-arm
            target: pilot-linux-arm64
          - os: windows-latest
            target: pilot-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @medalsocial/pilot build

      - name: Install optional deps for bundling
        run: pnpm add -D react-devtools-core --filter @medalsocial/pilot

      - name: Compile binary (Unix)
        if: "!contains(matrix.target, 'win')"
        run: bun build packages/cli/dist/bin/pilot.js --compile --outfile ${{ matrix.target }}

      - name: Compile binary (Windows)
        if: contains(matrix.target, 'win')
        run: bun build packages/cli/dist/bin/pilot.js --compile --outfile ${{ matrix.target }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.target }}
