name: Build Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: pilot-darwin-arm64
          - os: macos-13
            target: pilot-darwin-x64
          - os: ubuntu-latest
            target: pilot-linux-x64
          - os: ubuntu-24.04-arm
            target: pilot-linux-arm64
          - os: windows-latest
            target: pilot-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@735343b667d3e6e8be2acae5b2225a6adb0a0a46 # v2.1.1

      - run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @medalsocial/pilot build

      - name: Install optional deps for bundling
        run: pnpm add -D react-devtools-core --filter @medalsocial/pilot

      - name: Compile binary (Unix)
        if: "!contains(matrix.target, 'win')"
        run: bun build packages/cli/dist/bin/pilot.js --compile --outfile ${{ matrix.target }}

      - name: Compile binary (Windows)
        if: contains(matrix.target, 'win')
        run: bun build packages/cli/dist/bin/pilot.js --compile --outfile ${{ matrix.target }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          files: ${{ matrix.target }}
