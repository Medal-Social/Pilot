name: Release

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      attestations: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm quality

      - name: Create release PR or publish packages
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          commit: 'chore: release packages'
          title: 'chore: release packages'
          version: pnpm run version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Open back-merge PR (prod → dev) after publish
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail

          # After a successful publish, prod has version bumps + a regenerated
          # CHANGELOG.md + the consumed `.changeset/*.md` files deleted. Dev
          # still has the old versions and the un-deleted changeset files —
          # which is exactly what causes future promotion PRs to carry stale
          # already-shipped changesets and trigger duplicate releases.
          # Opening this back-merge PR automatically prevents that drift.

          # Idempotency: only skip if a back-merge PR for THIS run already
          # exists (e.g. a re-run of the same publish). A back-merge PR from a
          # *previous* release that's still awaiting approval must NOT block
          # the current run — otherwise dev would silently miss this release's
          # version bumps and changeset deletions, exactly what we're trying
          # to prevent.
          branch="chore/backmerge-prod-into-dev-after-${GITHUB_RUN_ID}"

          existing_for_this_run="$(gh pr list \
            --repo ${{ github.repository }} \
            --base dev \
            --head "$branch" \
            --state open \
            --json number \
            --jq '.[0].number // empty' || true)"

          if [ -n "$existing_for_this_run" ]; then
            echo "Back-merge PR #${existing_for_this_run} for this run already exists; nothing to do."
            exit 0
          fi

          # Surface (don't block on) prior unmerged back-merge PRs so the
          # operator knows to clean them up. The new PR's content supersedes
          # them anyway.
          stale_open="$(gh pr list \
            --repo ${{ github.repository }} \
            --base dev \
            --state open \
            --search 'head:chore/backmerge-prod-into-dev-after-' \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName != "'"$branch"'") | .number] | join(", ")' || true)"
          if [ -n "$stale_open" ]; then
            echo "::warning::Found earlier unmerged back-merge PRs (#${stale_open}). They are now superseded by this run's PR — close them after this one merges."
          fi

          git config user.name "medal-social-release-bot[bot]"
          git config user.email "277925859+medal-social-release-bot[bot]@users.noreply.github.com"

          # Build a branch off prod that's identical to it. The PR is then
          # head=branch, base=dev, so the merge into dev brings prod's tree
          # (version bumps, CHANGELOG, deleted changesets) onto dev.
          git fetch origin dev prod --quiet
          git checkout -B "$branch" origin/prod
          git push origin "$branch"

          # The empty-frontmatter changeset satisfies `changeset-required`
          # without affecting versions on the next release.
          mkdir -p .changeset
          cat > ".changeset/${branch//\//-}-skip.md" <<EOF
          ---
          ---

          No changeset: prod→dev back-merge after a successful release. Brings
          version bumps, CHANGELOG entries, and consumed changeset deletions
          back to dev.
          EOF
          git add .changeset/
          git commit -m "chore: skip changeset for automated back-merge"
          git push origin "$branch"

          body=$(cat <<EOF
          ## Summary

          Automated back-merge after publishing: ${PUBLISHED_PACKAGES}.

          Brings prod's post-release tree onto dev:
          - Version bump in \`packages/cli/package.json\`
          - Regenerated \`packages/cli/CHANGELOG.md\`
          - Deletion of consumed \`.changeset/*.md\` files

          Without this, dev's stale \`.changeset/*.md\` files would ride along on the next promotion PR and \`changesets/action\` would open a duplicate release PR with copy-pasted changelog entries.

          ---

          _Opened automatically by [\`release.yml\`](.github/workflows/release.yml) after the publish step succeeded._
          EOF
          )

          gh pr create \
            --repo ${{ github.repository }} \
            --base dev \
            --head "$branch" \
            --title "chore: back-merge prod into dev (post-release)" \
            --body "$body"

          # Best-effort auto-merge so the back-merge lands without a human
          # touching it. Branch protection on dev will normally still require
          # one approval — auto-approve.yml picks up bot-authored PRs.
          gh pr merge \
            --repo ${{ github.repository }} \
            --auto \
            --squash \
            "$branch" || echo "Auto-merge not enabled — back-merge PR awaits manual merge."
