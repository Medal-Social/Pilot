name: CI

on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - run: pnpm quality

      - run: pnpm test -- --run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - run: pnpm secret:scan

      - run: pnpm knip:check

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint install script
        run: shellcheck scripts/install.sh

      - name: Validate install script syntax
        run: sh -n scripts/install.sh

  changeset-required:
    # Skip ONLY on release-pipeline traffic — and require both the expected
    # head prefix AND the expected base, so a regular feature branch named
    # `chore/promote-with-ancestry-anything` can't bypass the gate.
    #
    # Skipped pairs (head → base):
    #   dev                                       → prod    (legacy promote)
    #   chore/promote-with-ancestry-*             → prod    (promote.yml)
    #   changeset-release/*                       → prod    (changesets/action release PR)
    #   prod                                      → dev     (legacy back-merge)
    #   chore/backmerge-prod-into-dev-after-*     → dev     (release.yml back-merge)
    if: |
      github.event_name == 'pull_request' &&
      !(github.base_ref == 'prod' && github.head_ref == 'dev') &&
      !(github.base_ref == 'prod' && startsWith(github.head_ref, 'chore/promote-with-ancestry-')) &&
      !(github.base_ref == 'prod' && startsWith(github.head_ref, 'changeset-release/')) &&
      !(github.base_ref == 'dev' && github.head_ref == 'prod') &&
      !(github.base_ref == 'dev' && startsWith(github.head_ref, 'chore/backmerge-prod-into-dev-after-'))
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile

      - name: Verify changeset presence
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: pnpm changeset:check
